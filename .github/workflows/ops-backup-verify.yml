name: Ops - Backup & Restore Verify

on:
  schedule:
    # Daily at 02:30 Asia/Riyadh (23:30 UTC)
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  backup_verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Wait for local Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Backup + restore check
        env:
          # Use Supabase session pooler host on IPv4 runners.
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          BACKUP_EXCLUDE_SCHEMAS: ${{ secrets.BACKUP_EXCLUDE_SCHEMAS }}
          BACKUP_EXCLUDE_EXTENSIONS: ${{ secrets.BACKUP_EXCLUDE_EXTENSIONS }}
          BACKUP_RETENTION_DAYS: ${{ secrets.BACKUP_RETENTION_DAYS }}
          PGSSLMODE: require
          RESTORE_DB_HOST: localhost
          RESTORE_DB_PORT: 5432
          RESTORE_DB_NAME: postgres
          RESTORE_DB_USER: postgres
          RESTORE_DB_PASSWORD: postgres
          RESTORE_DB_SSLMODE: disable
        run: npm run backup:verify
