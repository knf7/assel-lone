name: Aseel SaaS CI/CD Production Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  secrets_scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_and_test_backend:
    name: Backend CI 
    runs-on: ubuntu-latest
    needs: [secrets_scan]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: loan_management_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_db_password_123456
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install redis-cli
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Wait for services
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && redis-cli -h localhost -p 6379 ping && exit 0
            sleep 2
          done
          echo "Postgres/Redis did not become ready in time"
          exit 1

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_32_chars_minimum_ok
          JWT_EXPIRES_IN: 24h
          ADMIN_SECRET: test_admin_secret_key_32_chars_min_ok
          ADMIN_PASSWORD: test_admin_password_123
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: loan_management_test
          DB_USER: postgres
          DB_PASSWORD: test_db_password_123456
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          FRONTEND_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_ci_dummy_key
          STRIPE_PRO_PRICE_ID: price_ci_pro
          STRIPE_ENTERPRISE_PRICE_ID: price_ci_enterprise

  build_frontend:
    name: Frontend CI 
    runs-on: ubuntu-latest
    needs: [secrets_scan]
    defaults:
      run:
        working-directory: ./frontend-next
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend-next/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

  docker_deploy:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [secrets_scan, build_and_test_backend, build_frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check GHCR_PAT availability
        id: ghcr
        run: |
          if [ -n "${{ secrets.GHCR_PAT }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GHCR publish is enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GHCR_PAT is not configured. Docker publish steps will be skipped."
          fi
      
      - name: Set up Docker Buildx
        if: steps.ghcr.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v2

      - name: Log into GitHub Container Registry
        if: steps.ghcr.outputs.enabled == 'true'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Backend Image
        if: steps.ghcr.outputs.enabled == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aseel-backend:latest

      - name: Build and push Frontend Image
        if: steps.ghcr.outputs.enabled == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aseel-frontend:latest
