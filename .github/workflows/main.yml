name: Aseel SaaS CI/CD Production Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  secrets_scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_and_test_backend:
    name: Backend CI 
    runs-on: ubuntu-latest
    needs: [secrets_scan]
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_32_chars_minimum_ok
          JWT_EXPIRES_IN: 24h
          ADMIN_SECRET: test_admin_secret_key_32_chars_min_ok
          ADMIN_PASSWORD: test_admin_password_123
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: loan_management_test
          DB_USER: postgres
          DB_PASSWORD: test_db_password_123456
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          FRONTEND_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_ci_dummy_key
          STRIPE_PRO_PRICE_ID: price_ci_pro
          STRIPE_ENTERPRISE_PRICE_ID: price_ci_enterprise

  build_frontend:
    name: Frontend CI 
    runs-on: ubuntu-latest
    needs: [secrets_scan]
    defaults:
      run:
        working-directory: ./frontend-next
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend-next/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

  docker_deploy:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [secrets_scan, build_and_test_backend, build_frontend]
    if: github.ref == 'refs/heads/main' && secrets.GHCR_PAT != ''
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aseel-backend:latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend-next
          file: ./frontend-next/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aseel-frontend:latest
