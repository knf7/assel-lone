version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aseel-db-prod
    restart: always
    environment:
      POSTGRES_DB: loan_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - aseel-network

  redis:
    image: redis:7-alpine
    container_name: aseel-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - aseel-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aseel-backend-prod
    restart: always
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=loan_management
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      - db
      - redis
    networks:
      - aseel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aseel-frontend-prod
    restart: always
    networks:
      - aseel-network

  nginx:
    image: nginx:alpine
    container_name: aseel-nginx-prod
    restart: always
    volumes:
      - ./nginx/production.nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - aseel-network

networks:
  aseel-network:
    driver: bridge

volumes:
  postgres_data_prod:
