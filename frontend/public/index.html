    <title>أصيل المالي | نظام إدارة القروض</title>

    <style>
        /* Skip to main content - accessibility */
        .skip-to-main {
            position: fixed;
            top: -100%;
            right: 50%;
            transform: translateX(50%);
            background: #FF5722;
            color: #fff;
            padding: 10px 20px;
            border-radius: 0 0 8px 8px;
            z-index: 9999;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            transition: top 0.2s ease;
        }

        .skip-to-main:focus {
            top: 0;
            outline: 3px solid #fff;
            outline-offset: 2px;
        }

        /* Prevent FOUC */
        body {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        body.loaded {
            opacity: 1;
        }
    </style>
</head>

<body>
    <a href="#main-content" class="skip-to-main">تخطى إلى المحتوى الرئيسي</a>
    <noscript>
        <div style="text-align:center; padding:40px; font-family: 'Cairo', sans-serif; direction:rtl;">
            <h2>يجب تفعيل JavaScript</h2>
            <p>يجب تفعيل JavaScript في متصفحك لتشغيل تطبيق أصيل المالي.</p>
        </div>
    </noscript>
    <div id="root"></div>
    <script>
        // Prevent FOUC and apply saved theme immediately
        (function () {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.addEventListener('DOMContentLoaded', function () {
                document.body.classList.add('loaded');
            });
        })();
    </script>
</body>
